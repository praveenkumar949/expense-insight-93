services:
  postgres:
    image: postgres:16
    container_name: devops_project_postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../Database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  backend:
    build:
      context: ..
      dockerfile: Devops/docker/backend.Dockerfile
    container_name: devops_project_backend
    environment:
      PORT: 8080
      DATABASE_URL: postgres://app:app@postgres:5432/app
      JWT_SECRET: change-me
      FRONTEND_ORIGIN: "*"
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ..
      dockerfile: Devops/docker/frontend.Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    container_name: devops_project_frontend
    depends_on:
      - backend
    ports:
      - "8082:80"

  prometheus:
    image: prom/prometheus:v2.53.2
    container_name: devops_project_prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - promdata:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    depends_on:
      - backend

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: devops_project_alertmanager
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertdata:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"

  grafana:
    image: grafana/grafana:11.1.4
    container_name: devops_project_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  promdata:
  alertdata:
  grafanadata:

